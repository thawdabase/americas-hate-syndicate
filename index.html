<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>America's Hate Syndicate By Ivan A. Syndikov</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div id="loading-text">Loading book…</div>
    <div id="loading-bar-track">
      <div id="loading-bar-fill"></div>
    </div>
  </div>

  <!-- Three.js canvas target -->
  <div id="canvas-container"></div>

  <!-- Page / status indicator -->
  <div id="page-info">Cover</div>

  <!-- Controls legend -->
  <div id="controls-legend">
    <span>← → Pages</span>
    <span>W A D Rotate</span>
    <span>P Preset</span>
    <span>R Reset</span>
    <span>Drag Orbit</span>
    <span>Scroll Zoom</span>
  </div>

  <!-- Three.js r128 non-modular -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="book.js"></script>
</body>
</html>
